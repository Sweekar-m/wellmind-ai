<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for WellMindAI — Create your free account today">
    <title>Register — WellMindAI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

    <header class="header" id="main-header">
        <a href="/" class="header__brand">
            <div class="header__brand-icon">🌿</div>
            WellMindAI
        </a>
        <nav class="header__nav">
            <a href="/" class="header__nav-link" id="nav-home">
                <span>Home</span>
            </a>
            <a href="/login" class="header__nav-link" id="nav-login">
                🔐 <span>Login</span>
            </a>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-card__title">Create Your Account</h1>
            <p class="auth-card__subtitle">Join thousands finding their wellness journey</p>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-input"
                        placeholder="Choose a unique username"
                        required
                        minlength="3"
                        maxlength="20"
                    />
                    <small class="form-hint">3-20 characters, letters & numbers</small>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="form-input"
                        placeholder="your@email.com"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="At least 6 characters"
                        required
                        minlength="6"
                    />
                    <small class="form-hint">Minimum 6 characters</small>
                </div>

                <div id="error-message" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn--primary btn--full">
                    Create Account
                </button>
            </form>

            <div class="auth-divider">or</div>

            <p class="auth-footer">
                Already have an account?
                <a href="/login" class="auth-link">Login here</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMessage.textContent = data.error || 'Registration failed';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please try again.';
                errorMessage.style.display = 'block';
            }
        });
    </script>

</body>
</html>
