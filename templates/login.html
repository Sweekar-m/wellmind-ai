<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to WellMindAI — Access your wellness conversations">
    <title>Login — WellMindAI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

    <header class="header" id="main-header">
        <a href="/" class="header__brand">
            <div class="header__brand-icon">🌿</div>
            WellMindAI
        </a>
        <nav class="header__nav">
            <a href="/" class="header__nav-link" id="nav-home">
                <span>Home</span>
            </a>
            <a href="/register" class="header__nav-link" id="nav-register">
                📝 <span>Register</span>
            </a>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-card__title">Welcome Back</h1>
            <p class="auth-card__subtitle">Log in to continue your wellness journey</p>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-input"
                        placeholder="your username"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="your password"
                        required
                    />
                </div>

                <div id="error-message" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn--primary btn--full">
                    Login
                </button>
            </form>

            <div class="auth-divider">or</div>

            <p class="auth-footer">
                Don't have an account?
                <a href="/register" class="auth-link">Create one here</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMessage.textContent = data.error || 'Login failed';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please try again.';
                errorMessage.style.display = 'block';
            }
        });
    </script>

</body>
</html>
